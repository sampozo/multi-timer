name: Android Production Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies and compile assets
        run: |
          cd app
          npm ci
          npm run build
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android App Bundle (AAB) for Play Store
        run: |
          cd app/android
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon
        env:
          JAVA_OPTS: '-Xmx2048m'

      - name: Build Debug Android Package (APK) for testing
        run: |
          cd app/android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_OPTS: '-Xmx2048m'

      - name: Find AAB
        id: find_aab
        run: |
          echo "aab_path=$(find . -name "*.aab" -type f | head -1)" >> $GITHUB_OUTPUT

      - name: Find APK
        id: find_apk
        run: |
          echo "apk_path=$(find . -name "*.apk" -type f | head -1)" >> $GITHUB_OUTPUT

      - name: Upload Play Store AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiTimer-play-store-release
          path: ${{ steps.find_aab.outputs.aab_path }}
          retention-days: 30

      - name: Upload Testing APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiTimer-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
